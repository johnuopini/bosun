name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  TAP_REPO: yetidevworks/homebrew-bosun

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: bosun
            asset_name: bosun-darwin-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: bosun
            asset_name: bosun-darwin-aarch64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: bosun
            asset_name: bosun-linux-x86_64
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: bosun
            asset_name: bosun-linux-aarch64
            use_cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf ../../../${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}
          cd -

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crate:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  update-formula:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    env:
      FORMULA_PATH: Formula/bosun.rb
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download tarballs from the GitHub Release
        # Pulling from the release page (already populated by the
        # `release` job above) rather than the Actions artifact API
        # avoids the intermittent 403 from `ListArtifacts` that hits
        # when `update-formula` and `publish-crate` both call
        # download-artifact concurrently against the same run.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/artifacts
          cd /tmp/artifacts
          for f in \
            bosun-darwin-aarch64.tar.gz \
            bosun-darwin-x86_64.tar.gz \
            bosun-linux-x86_64.tar.gz \
            bosun-linux-aarch64.tar.gz; do
            gh release download "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern "${f}" \
              --clobber
          done
          ls -la

      - name: Compute SHAs
        id: shas
        run: |
          set -euo pipefail
          hash() { sha256sum "$1" | awk '{print $1}'; }

          f=/tmp/artifacts/bosun-darwin-aarch64.tar.gz
          [[ -f "$f" ]] && echo "darwin_arm64_sha=$(hash "$f")" >> $GITHUB_OUTPUT

          f=/tmp/artifacts/bosun-darwin-x86_64.tar.gz
          [[ -f "$f" ]] && echo "darwin_x86_64_sha=$(hash "$f")" >> $GITHUB_OUTPUT

          f=/tmp/artifacts/bosun-linux-x86_64.tar.gz
          [[ -f "$f" ]] && echo "linux_x86_64_sha=$(hash "$f")" >> $GITHUB_OUTPUT

          f=/tmp/artifacts/bosun-linux-aarch64.tar.gz
          [[ -f "$f" ]] && echo "linux_aarch64_sha=$(hash "$f")" >> $GITHUB_OUTPUT

      - name: Read version from Cargo.toml
        id: cargo
        run: |
          set -euo pipefail
          VERSION=$(awk '
            /^\[package\]/ {pkg=1; next}
            /^\[/ && $0 !~ /^\[package\]/ {pkg=0}
            pkg && $1 == "version" && $2 == "=" {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches tag
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION='${{ steps.cargo.outputs.version }}'
          if [[ "${TAG_VERSION}" != "${CARGO_VERSION}" ]]; then
            echo "Tag version (${TAG_VERSION}) does not match Cargo version (${CARGO_VERSION})." >&2
            exit 1
          fi

      - name: Write formula and push
        env:
          GITHUB_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
          VER: ${{ steps.cargo.outputs.version }}
          DARWIN_ARM64_SHA: ${{ steps.shas.outputs.darwin_arm64_sha }}
          DARWIN_X86_64_SHA: ${{ steps.shas.outputs.darwin_x86_64_sha }}
          LINUX_X86_64_SHA: ${{ steps.shas.outputs.linux_x86_64_sha }}
          LINUX_AARCH64_SHA: ${{ steps.shas.outputs.linux_aarch64_sha }}
        run: |
          set -euo pipefail
          TAP_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"

          if [[ -z "${DARWIN_ARM64_SHA}" || -z "${DARWIN_X86_64_SHA}" || -z "${LINUX_X86_64_SHA}" || -z "${LINUX_AARCH64_SHA}" ]]; then
            echo "Missing required SHAs for Homebrew formula." >&2
            exit 1
          fi

          # Use gh CLI for authentication
          gh repo clone "${TAP_REPO}" tap || git init tap

          cd tap
          mkdir -p "$(dirname "${FORMULA_PATH}")"

          # Write formula using printf to avoid YAML parsing issues with heredoc.
          #
          # OS/arch selection uses top-level `if OS.mac?` / `if OS.linux?`
          # with an `else` fallback for the arch. The previous nested
          # `on_macos do ... on_intel do` DSL and `if Hardware::CPU.intel?`
          # variant both fail on Homebrew 5.x setups where CPU detection
          # returns `:dunno` — both `Hardware::CPU.intel?` and `.arm?`
          # then return `false`, so neither branch registers a URL and
          # `brew info` / `brew outdated` fail with "formula requires at
          # least a URL" (yetidevworks/bosun#1). `OS.*` is reliable, and
          # `else` correctly picks the x86_64 binary on a CPU that fails
          # to report as either intel or arm.
          printf '%s\n' \
            "class Bosun < Formula" \
            "  desc \"Tmux-native orchestrator for AI agent sessions\"" \
            "  homepage \"https://github.com/${GITHUB_REPOSITORY}\"" \
            "  license \"MIT\"" \
            "  version \"${VER}\"" \
            "" \
            "  if OS.mac?" \
            "    if Hardware::CPU.arm?" \
            "      url \"${TAP_URL}/bosun-darwin-aarch64.tar.gz\"" \
            "      sha256 \"${DARWIN_ARM64_SHA}\"" \
            "    else" \
            "      url \"${TAP_URL}/bosun-darwin-x86_64.tar.gz\"" \
            "      sha256 \"${DARWIN_X86_64_SHA}\"" \
            "    end" \
            "  end" \
            "" \
            "  if OS.linux?" \
            "    if Hardware::CPU.arm?" \
            "      url \"${TAP_URL}/bosun-linux-aarch64.tar.gz\"" \
            "      sha256 \"${LINUX_AARCH64_SHA}\"" \
            "    else" \
            "      url \"${TAP_URL}/bosun-linux-x86_64.tar.gz\"" \
            "      sha256 \"${LINUX_X86_64_SHA}\"" \
            "    end" \
            "  end" \
            "" \
            "  def install" \
            "    bin.install \"bosun\"" \
            "  end" \
            "" \
            "  test do" \
            "    assert_match \"bosun\", shell_output(\"#{bin}/bosun --version\")" \
            "  end" \
            "end" > "${FORMULA_PATH}"

          git config user.name "bosun-bot"
          git config user.email "bosun-bot@users.noreply.github.com"
          git add "${FORMULA_PATH}"
          if git diff --cached --quiet; then
            echo "No formula changes to commit."
            exit 0
          fi
          git commit -m "bosun ${VER}: update Homebrew formula"

          # Push using gh CLI
          git remote set-url origin "https://github.com/${TAP_REPO}.git" || git remote add origin "https://github.com/${TAP_REPO}.git"
          gh auth setup-git
          git push origin HEAD:main
